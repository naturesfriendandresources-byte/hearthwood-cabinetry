<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFR Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<style>
  :root {
    --navy:    #1C2B4A;
    --navy2:   #263654;
    --sage:    #3A6B5F;
    --sage2:   #2E5548;
    --gold:    #C9A96E;
    --cream:   #F2EEE6;
    --light:   #EEF3F1;
    --muted:   #6B7B7A;
    --border:  #D0DDD9;
    --text:    #1C2B4A;
    --white:   #FFFFFF;
    --error:   #DC2626;
    --user-bg: #1C2B4A;
    --ai-bg:   #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Lato', sans-serif;
    background: var(--light);
    color: var(--text);
  }

  /* ── LAYOUT ────────────────────────────────────────────── */
  .cc-wrapper {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    box-shadow: 0 0 40px rgba(0,0,0,.08);
    background: var(--white);
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .cc-header {
    background: var(--navy);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .cc-header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .cc-back {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff;
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: background .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cc-back:hover { background: rgba(255,255,255,.22); }

  .cc-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
  }
  .cc-title .cc-sub {
    display: block;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 400;
    opacity: .6;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .cc-header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cc-model-badge {
    background: rgba(201,169,110,.18);
    border: 1px solid rgba(201,169,110,.4);
    color: var(--gold);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .3px;
  }

  .cc-user-name {
    font-size: 13px;
    opacity: .75;
  }

  /* ── MESSAGES AREA ──────────────────────────────────────── */
  .cc-messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: var(--light);
  }

  /* ── WELCOME CARD ───────────────────────────────────────── */
  .cc-welcome {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    border-radius: 12px;
    padding: 24px 28px;
    max-width: 680px;
    align-self: flex-start;
  }

  .cc-welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--navy);
    margin-bottom: 10px;
  }

  .cc-welcome p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .cc-quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .cc-quick-btn {
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--sage);
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-family: 'Lato', sans-serif;
  }
  .cc-quick-btn:hover {
    background: #e0ece9;
    border-color: var(--sage);
  }

  /* ── MESSAGE BUBBLES ────────────────────────────────────── */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 720px;
  }

  .msg-row.from-user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-row.from-ai {
    align-self: flex-start;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .msg-row.from-ai .msg-avatar {
    background: var(--sage);
    color: #fff;
  }

  .msg-row.from-user .msg-avatar {
    background: var(--navy);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .msg-bubble {
    border-radius: 16px;
    padding: 13px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 580px;
  }

  .msg-row.from-user .msg-bubble {
    background: var(--user-bg);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg-row.from-ai .msg-bubble {
    background: var(--ai-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }

  /* Markdown formatting inside AI bubbles */
  .msg-bubble strong { font-weight: 700; }
  .msg-bubble em { font-style: italic; }
  .msg-bubble ul, .msg-bubble ol {
    margin: 8px 0 8px 18px;
  }
  .msg-bubble li {
    margin-bottom: 4px;
  }
  .msg-bubble p {
    margin-bottom: 8px;
  }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }
  .msg-bubble code {
    background: #f0f0f0;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 13px;
    font-family: monospace;
  }

  /* ── TYPING INDICATOR ───────────────────────────────────── */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--sage);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .5; }
    40%            { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT AREA ─────────────────────────────────────────── */
  .cc-input-area {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    background: var(--white);
    flex-shrink: 0;
  }

  .cc-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .cc-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 12px 18px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color .15s;
    overflow-y: auto;
  }
  .cc-input:focus { border-color: var(--navy); }

  .cc-send {
    background: var(--navy);
    color: #fff;
    border: none;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
  }
  .cc-send:hover { background: var(--navy2); transform: scale(1.05); }
  .cc-send:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .cc-input-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  /* ── ERROR BANNER ───────────────────────────────────────── */
  .cc-error {
    background: #FEE2E2;
    color: var(--error);
    border: 1px solid #FECACA;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin: 8px 0 0;
    display: none;
  }
  .cc-error.show { display: block; }

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    .cc-header { padding: 12px 16px; }
    .cc-title { font-size: 15px; }
    .cc-messages { padding: 18px 14px 12px; }
    .cc-input-area { padding: 12px 14px; }
    .msg-bubble { font-size: 13px; max-width: 280px; }
    .cc-welcome { padding: 18px 18px; }
    .cc-model-badge { display: none; }
  }
</style>
</head>
<body>

<div class="cc-wrapper">

  <!-- HEADER -->
  <div class="cc-header">
    <div class="cc-header-left">
      <a class="cc-back" href="index.html">
        <i class="fa-solid fa-arrow-left"></i> Dashboard
      </a>
      <div class="cc-title">
        🌿 NFR Command Center
        <span class="cc-sub">Powered by Claude Opus</span>
      </div>
    </div>
    <div class="cc-header-right">
      <span class="cc-model-badge">Claude Opus 4</span>
      <span class="cc-user-name" id="header-name">Jose Martinez</span>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="cc-messages" id="cc-messages">

    <!-- Welcome card (hidden once conversation starts) -->
    <div class="cc-welcome" id="cc-welcome">
      <h2>Good morning, Jose.</h2>
      <p>Your Command Center is live. Ask me anything about NFR — team, projects, training, proposals, SOPs, or strategy. I know your business.</p>
      <div class="cc-quick-btns">
        <button class="cc-quick-btn" onclick="quickSend('What should I focus on today?')">Today\'s focus</button>
        <button class="cc-quick-btn" onclick="quickSend('What\'s the status on team training?')">Training status</button>
        <button class="cc-quick-btn" onclick="quickSend('Give me a quick proposal for a kitchen remodel — client wants mid-range, approx 10x12 kitchen.')">Draft proposal</button>
        <button class="cc-quick-btn" onclick="quickSend('What are the current NFR markup rules I should use for a flooring job?')">Pricing rules</button>
        <button class="cc-quick-btn" onclick="quickSend('Summarize what needs to happen this week.')">This week</button>
      </div>
    </div>

  </div>

  <!-- INPUT AREA -->
  <div class="cc-input-area">
    <div class="cc-error" id="cc-error"></div>
    <div class="cc-input-row">
      <textarea
        class="cc-input"
        id="cc-input"
        placeholder="Ask anything about NFR…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="cc-send" id="cc-send" onclick="sendMessage()" title="Send">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
    <div class="cc-input-hint">Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script src="js/auth.js"></script>
<script>
// ── Auth: Jose only ─────────────────────────────────────────────────────────
var session = NFRAuth.requireAuth('command-center');
if (session) {
  document.getElementById('header-name').textContent = session.name;
}

// ── Conversation state ───────────────────────────────────────────────────────
var conversationHistory = [];
var isLoading = false;

// ── Auto-resize textarea ─────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── Handle Enter key ─────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── Quick send buttons ───────────────────────────────────────────────────────
function quickSend(text) {
  document.getElementById('cc-input').value = text;
  sendMessage();
}

// ── Send message ─────────────────────────────────────────────────────────────
function sendMessage() {
  if (isLoading) return;

  var input = document.getElementById('cc-input');
  var text  = input.value.trim();
  if (!text) return;

  // Hide welcome card after first message
  var welcome = document.getElementById('cc-welcome');
  if (welcome) welcome.style.display = 'none';

  // Clear input
  input.value = '';
  input.style.height = 'auto';

  hideError();

  // Add user message to history and UI
  conversationHistory.push({ role: 'user', content: text });
  appendMessage('user', text);

  // Show typing indicator
  var typingId = showTyping();
  setLoading(true);

  // Call jose-assistant function
  fetch('/.netlify/functions/jose-assistant', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: conversationHistory,
      role: session ? session.role : '',
    }),
  })
  .then(function(res) {
    removeTyping(typingId);
    if (!res.ok) {
      return res.json().then(function(d) {
        throw new Error(d.error || 'Server error');
      });
    }
    return res.json();
  })
  .then(function(data) {
    var reply = data.reply || '';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);
  })
  .catch(function(err) {
    showError(err.message || 'Something went wrong. Please try again.');
  })
  .finally(function() {
    setLoading(false);
    input.focus();
  });
}

// ── Append message to UI ─────────────────────────────────────────────────────
function appendMessage(from, text) {
  var container = document.getElementById('cc-messages');

  var row = document.createElement('div');
  row.className = 'msg-row from-' + from;

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar';

  if (from === 'ai') {
    avatar.innerHTML = '<i class="fa-solid fa-leaf"></i>';
  } else {
    avatar.textContent = (session && session.name) ? session.name.charAt(0).toUpperCase() : 'J';
  }

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (from === 'ai') {
    bubble.innerHTML = renderMarkdown(text);
  } else {
    bubble.textContent = text;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);

  scrollToBottom();
  return row;
}

// ── Simple markdown renderer ─────────────────────────────────────────────────
function renderMarkdown(text) {
  // Escape HTML first (except we'll re-add intentional markup)
  var escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Process line by line
  var lines = escaped.split('\n');
  var html = '';
  var inList = false;
  var listType = '';

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Horizontal rule
    if (/^━+$/.test(line) || /^─+$/.test(line) || /^-{3,}$/.test(line)) {
      if (inList) { html += '</' + listType + '>'; inList = false; }
      html += '<hr>';
      continue;
    }

    // Bold headers (lines ending with a colon that are short — treat as label)
    // Bullet list: - item or * item
    if (/^[\-\*] /.test(line)) {
      if (!inList || listType !== 'ul') {
        if (inList) html += '</' + listType + '>';
        html += '<ul>'; inList = true; listType = 'ul';
      }
      html += '<li>' + inlineFormat(line.replace(/^[\-\*] /, '')) + '</li>';
      continue;
    }

    // Numbered list
    if (/^\d+\. /.test(line)) {
      if (!inList || listType !== 'ol') {
        if (inList) html += '</' + listType + '>';
        html += '<ol>'; inList = true; listType = 'ol';
      }
      html += '<li>' + inlineFormat(line.replace(/^\d+\. /, '')) + '</li>';
      continue;
    }

    // Close list
    if (inList) { html += '</' + listType + '>'; inList = false; }

    // Empty line
    if (line.trim() === '') {
      html += '';
      continue;
    }

    // Regular paragraph
    html += '<p>' + inlineFormat(line) + '</p>';
  }

  if (inList) html += '</' + listType + '>';
  return html;
}

function inlineFormat(text) {
  // Bold **text** or __text__
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic *text* or _text_
  text = text.replace(/\*([^\*]+)\*/g, '<em>$1</em>');
  text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
  // Inline code `code`
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  return text;
}

// ── Typing indicator ─────────────────────────────────────────────────────────
var typingCounter = 0;

function showTyping() {
  var id = 'typing-' + (++typingCounter);
  var container = document.getElementById('cc-messages');

  var row = document.createElement('div');
  row.className = 'msg-row from-ai';
  row.id = id;

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.innerHTML = '<i class="fa-solid fa-leaf"></i>';

  var indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  row.appendChild(avatar);
  row.appendChild(indicator);
  container.appendChild(row);

  scrollToBottom();
  return id;
}

function removeTyping(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}

// ── Scroll to bottom ─────────────────────────────────────────────────────────
function scrollToBottom() {
  var container = document.getElementById('cc-messages');
  container.scrollTop = container.scrollHeight;
}

// ── Loading state ─────────────────────────────────────────────────────────────
function setLoading(state) {
  isLoading = state;
  var btn   = document.getElementById('cc-send');
  var input = document.getElementById('cc-input');
  btn.disabled   = state;
  input.disabled = state;
}

// ── Error handling ────────────────────────────────────────────────────────────
function showError(msg) {
  var el = document.getElementById('cc-error');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

function hideError() {
  var el = document.getElementById('cc-error');
  el.classList.remove('show');
}

// ── Focus input on load ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    document.getElementById('cc-input').focus();
  }, 100);
});
</script>
</body>
</html>
