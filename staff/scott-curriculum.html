<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scott's Curriculum — NFR Staff Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    :root {
      --primary:  #C4622D;
      --primary2: #A3521F;
      --accent:   #C4622D;
      --light:    #FBF6F2;
      --border:   #E8C4A8;
      --text:     #2C2C2C;
      --muted:    #7B6B60;
      --linen:    #F5EDE6;
      --linen-dk: #EAD9CE;
      --cnc:      #C4622D;
      --office:   #A8CEBF;
      --warehouse:#5A7FA3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    a { color: var(--accent); }

    /* ── Header ──────────────────────────────────────────── */
    .app-header {
      background: var(--primary2);
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-brand span { opacity: .65; font-size: 13px; font-family: 'Lato', sans-serif; font-weight: 400; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-back {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-back:hover { background: rgba(255,255,255,.22); color: #fff; }
    .btn-logout {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 12px; font-weight: 700;
      cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,255,255,.22); }

    /* ── Page ────────────────────────────────────────────── */
    .curric-main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .page-title { font-size: 1.6rem; color: var(--primary2); margin-bottom: .2rem; }
    .page-sub   { font-size: .88rem; color: var(--muted); margin-bottom: 2rem; }

    /* ── Week Tabs ───────────────────────────────────────── */
    .week-tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .week-tab {
      background: var(--linen);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: .45rem 1rem;
      font-size: .82rem;
      font-weight: 700;
      color: var(--primary2);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      font-family: 'Lato', sans-serif;
    }
    .week-tab:hover { background: var(--linen-dk); }
    .week-tab.active { background: var(--primary2); color: #fff; border-color: var(--primary2); }

    /* ── Week Header ─────────────────────────────────────── */
    .week-header {
      background: var(--primary2);
      color: #fff;
      border-radius: 12px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 1.25rem;
    }
    .week-header h2 { font-size: 1.1rem; margin-bottom: .15rem; }
    .week-header-dates { font-size: .75rem; opacity: .6; margin-top: .2rem; }

    /* ── Day Card ────────────────────────────────────────── */
    .day-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.07); margin-bottom: 10px; overflow: hidden; }
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.2rem;
      cursor: pointer;
      user-select: none;
      gap: 1rem;
    }
    .day-header:hover { background: var(--linen); }
    .day-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--primary2); }
    .day-date { font-size: .78rem; color: var(--muted); margin-left: .6rem; }
    .day-topic { font-size: .74rem; color: var(--muted); text-align: right; flex: 1; }
    .day-chevron { color: var(--muted); font-size: .78rem; transition: transform .18s; flex-shrink: 0; }
    .day-card.open .day-chevron { transform: rotate(180deg); }
    .day-body { display: none; border-top: 1px solid var(--linen); }
    .day-card.open .day-body { display: block; }

    /* ── Steps ───────────────────────────────────────────── */
    .step-section { padding: 1rem 1.2rem; border-bottom: 1px solid var(--linen); }
    .step-section:last-child { border-bottom: none; }

    .step-label-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .55rem; }
    .step-badge {
      display: inline-block;
      font-size: .66rem; font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .18rem .55rem;
      border-radius: 4px;
      color: #fff;
    }
    .badge-cnc       { background: var(--cnc); }
    .badge-office    { background: var(--office); color: #2C5245; }
    .badge-warehouse { background: var(--warehouse); }
    .step-time { font-size: .73rem; color: var(--muted); }

    .step-title { font-family: 'Playfair Display', serif; font-size: .98rem; color: var(--primary2); margin-bottom: .45rem; }

    .field-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: .12rem; margin-top: .5rem; }
    .field-value { font-size: .86rem; color: var(--text); line-height: 1.5; }

    .tip-box {
      background: var(--linen);
      border-left: 3px solid var(--accent);
      padding: .45rem .7rem;
      font-size: .84rem;
      font-style: italic;
      color: var(--primary2);
      border-radius: 0 4px 4px 0;
      margin-top: .55rem;
    }

    .scenario-box {
      background: var(--linen);
      border-radius: 8px;
      padding: .55rem .85rem;
      font-size: .84rem;
      color: var(--text);
      margin-top: .3rem;
      line-height: 1.5;
    }

    .objectives { margin: 0; padding-left: 1.1rem; font-size: .84rem; color: var(--text); }
    .objectives li { margin-bottom: .2rem; }

    .btn-resource {
      display: inline-block;
      margin-top: .45rem;
      background: var(--cnc);
      color: #fff;
      border-radius: 6px;
      padding: .3rem .85rem;
      font-size: .76rem;
      font-weight: 700;
      text-decoration: none;
      font-family: 'Lato', sans-serif;
    }
    .btn-resource:hover { opacity: .85; color: #fff; }

    .no-content { font-size: .8rem; color: var(--muted); font-style: italic; }

    @media (max-width: 600px) {
      .day-topic { display: none; }
      .week-tab { font-size: .76rem; padding: .38rem .75rem; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-brand">
      🌿 NFR Staff Portal <span>· Scott's Curriculum</span>
    </div>
    <div class="header-right">
      <a href="index.html" class="btn-back">← Dashboard</a>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </header>

  <main class="curric-main">
    <h1 class="page-title">Scott's Training Curriculum</h1>
    <p class="page-sub">Every CNC session, office admin task, and warehouse check — weeks 1–7.</p>
    <div class="week-tabs" id="week-tabs"></div>
    <div id="week-content"></div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/training-content.js"></script>
  <script src="js/content-library.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var session = NFRAuth.requireAuth('scott-curriculum');
    if (!session) return;

    document.getElementById('btn-logout').addEventListener('click', NFRAuth.logout);

    // ── Week config ─────────────────────────────────────────────────
    var WEEKS = [
      { num: 1, label: 'Week 1', start: '2026-03-16' },
      { num: 2, label: 'Week 2', start: '2026-03-23' },
      { num: 3, label: 'Week 3', start: '2026-03-30' },
      { num: 4, label: 'Week 4', start: '2026-04-06' },
      { num: 5, label: 'Week 5', start: '2026-04-13' },
      { num: 6, label: 'Week 6', start: '2026-04-20' },
      { num: 7, label: 'Week 7', start: '2026-04-27' },
    ];
    var DAY_NAMES = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    var activeWeek = 0;

    function weekDates(start) {
      var base = new Date(start + 'T12:00:00');
      return Array.from({ length: 5 }, function (_, i) {
        var d = new Date(base);
        d.setDate(d.getDate() + i);
        return d.toISOString().slice(0, 10);
      });
    }

    function fmtDate(ds) {
      return new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ── Tabs ────────────────────────────────────────────────────────
    function renderTabs() {
      var el = document.getElementById('week-tabs');
      el.innerHTML = WEEKS.map(function (w, i) {
        return '<button class="week-tab' + (i === activeWeek ? ' active' : '') + '" data-idx="' + i + '">' + w.label + '</button>';
      }).join('');
      el.querySelectorAll('.week-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          activeWeek = parseInt(btn.dataset.idx);
          renderTabs();
          renderWeek();
        });
      });
    }

    // ── Week ────────────────────────────────────────────────────────
    function renderWeek() {
      var w = WEEKS[activeWeek];
      var dates = weekDates(w.start);
      var mondayData = getTrainingDay('scott', dates[0]);
      var weekTopic = mondayData ? mondayData.topic : w.label;

      var html = '<div class="week-header">' +
        '<h2>' + w.label + ' — ' + weekTopic + '</h2>' +
        '<div class="week-header-dates">' + fmtDate(dates[0]) + ' – ' + fmtDate(dates[4]) + '</div>' +
        '</div>';

      dates.forEach(function (ds, di) {
        html += buildDayCard(ds, di);
      });

      var el = document.getElementById('week-content');
      el.innerHTML = html;

      el.querySelectorAll('.day-header').forEach(function (hdr) {
        hdr.addEventListener('click', function () {
          hdr.closest('.day-card').classList.toggle('open');
        });
      });

      var first = el.querySelector('.day-card');
      if (first) first.classList.add('open');
    }

    // ── Day card ────────────────────────────────────────────────────
    function buildDayCard(ds, di) {
      var cnc    = getTrainingDay('scott', ds);
      var office = CONTENT_LIBRARY.getOfficeContent(ds);

      return '<div class="day-card">' +
        '<div class="day-header">' +
          '<div style="display:flex;align-items:baseline;gap:.5rem;">' +
            '<span class="day-name">' + DAY_NAMES[di] + '</span>' +
            '<span class="day-date">' + fmtDate(ds) + '</span>' +
          '</div>' +
          '<div class="day-topic">' + (cnc ? cnc.topic : '') + '</div>' +
          '<i class="fa-solid fa-chevron-down day-chevron"></i>' +
        '</div>' +
        '<div class="day-body">' +
          stepCNC(cnc) +
          stepOffice(office) +
          stepWarehouse() +
        '</div>' +
      '</div>';
    }

    // ── Step 1: CNC (50 min) ────────────────────────────────────────
    function stepCNC(c) {
      if (!c) return '<div class="step-section"><div class="step-label-row"><span class="step-badge badge-cnc">Step 1 — CNC</span><span class="step-time">50 min</span></div><p class="no-content">No content scheduled.</p></div>';

      var objs = (c.objectives || []).map(function (o) { return '<li>' + o + '</li>'; }).join('');

      return '<div class="step-section">' +
        '<div class="step-label-row"><span class="step-badge badge-cnc">Step 1 — CNC</span><span class="step-time">50 min · Week ' + c.week + ' Day ' + c.day + '</span></div>' +
        '<div class="step-title">' + c.topic + '</div>' +
        (objs ? '<div class="field-label">Objectives</div><ul class="objectives">' + objs + '</ul>' : '') +
        '<div class="field-label">Practice Task</div><div class="field-value">' + (c.task || '') + '</div>' +
        '<div class="tip-box">"' + (c.tip || '') + '"</div>' +
        (c.resourceUrl ? '<a href="' + c.resourceUrl + '" target="_blank" rel="noopener" class="btn-resource">' + (c.resourceLabel || 'Resource') + ' →</a>' : '') +
      '</div>';
    }

    // ── Step 2: Office Administration (20 min) ──────────────────────
    function stepOffice(o) {
      if (!o) return '<div class="step-section"><div class="step-label-row"><span class="step-badge badge-office">Step 2 — Office Admin</span><span class="step-time">20 min</span></div><p class="no-content">No content scheduled.</p></div>';

      return '<div class="step-section">' +
        '<div class="step-label-row"><span class="step-badge badge-office">Step 2 — Office Administration</span><span class="step-time">20 min</span></div>' +
        '<div class="step-title">' + o.topic + '</div>' +
        '<div class="field-label">Focus</div><div class="field-value">' + o.focus + '</div>' +
        '<div class="field-label">Scenario</div><div class="scenario-box">' + o.scenario + '</div>' +
        '<div class="field-label">His Task</div><div class="field-value">' + o.task + '</div>' +
        '<div class="tip-box">"' + o.tip + '"</div>' +
      '</div>';
    }

    // ── Step 3: Warehouse Check (30 min) — static ───────────────────
    function stepWarehouse() {
      return '<div class="step-section">' +
        '<div class="step-label-row"><span class="step-badge badge-warehouse">Step 3 — Warehouse Check</span><span class="step-time">30 min</span></div>' +
        '<div class="step-title">Daily Inventory Verification</div>' +
        '<div class="field-value">Confirm current quantities, flag any discrepancy, clock out.</div>' +
      '</div>';
    }

    // ── Init ────────────────────────────────────────────────────────
    renderTabs();
    renderWeek();
  });
  </script>
</body>
</html>
