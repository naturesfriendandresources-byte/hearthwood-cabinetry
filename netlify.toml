# Netlify configuration for Hearthwood Cabinetry
# Plain static site — no build step required

[build]
  # No build command needed (plain HTML/CSS/JS)
  publish = "."
  functions = "netlify/functions"


[[redirects]]
  # Root → staff portal
  from   = "/"
  to     = "/staff/"
  status = 302

[[redirects]]
  # Clean 404 fallback
  from   = "/*"
  to     = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  # Cache static assets aggressively
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # HTML files revalidate on every visit
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
